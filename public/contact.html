<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Kadam Travels</title>
    <style>
        :root {
            --brand-blue: #0d4a99;
            --brand-blue-dark: #083a7b;
            --page-bg: #f4f3f8;
            --card-border: #e3e5ea;
            --text-dark: #2f3140;
            --text-soft: #525868;
            --success: #27a34c;
            --success-dark: #1e893f;
            --icon-green: #22a548;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: var(--page-bg);
            color: var(--text-dark);
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .topbar {
            background: linear-gradient(180deg, var(--brand-blue), var(--brand-blue-dark));
            color: #fff;
            padding: 14px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            font-weight: 600;
        }

        .contact-line {
            font-size: 1.05rem;
            white-space: nowrap;
        }

        .nav {
            display: flex;
            align-items: center;
            gap: 34px;
            flex-wrap: wrap;
        }

        .nav a {
            position: relative;
            font-size: 1.2rem;
        }

        .nav a.active::after {
            content: "";
            position: absolute;
            left: 0;
            right: 0;
            bottom: -8px;
            height: 2px;
            background: #fff;
            border-radius: 999px;
        }

        .page {
            width: min(980px, calc(100% - 36px));
            margin: 0 auto;
            padding: 34px 0 40px;
        }

        .page-title {
            margin: 0 0 28px;
            text-align: center;
            color: var(--brand-blue);
            font-size: clamp(2.3rem, 4vw, 3.35rem);
            font-weight: 800;
        }

        .contact-card {
            max-width: 920px;
            margin: 0 auto;
            padding: 28px 18px 18px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid var(--card-border);
            box-shadow: 0 8px 22px rgba(23, 33, 56, 0.05);
        }

        .contact-card h2 {
            margin: 0;
            text-align: center;
            font-size: clamp(2rem, 3vw, 2.8rem);
            color: var(--brand-blue);
        }

        .contact-card p {
            margin: 16px auto 24px;
            max-width: 760px;
            text-align: center;
            color: var(--text-soft);
            font-size: clamp(1.05rem, 1.8vw, 1.38rem);
            line-height: 1.55;
        }

        .info-card {
            display: flex;
            align-items: center;
            gap: 18px;
            margin: 0 0 14px;
            padding: 14px 16px;
            background: #f8f8fb;
            border: 1px solid #e4e5ea;
        }

        .info-icon {
            width: 42px;
            flex-shrink: 0;
            text-align: center;
            color: var(--icon-green);
            font-size: 28px;
            line-height: 1;
        }

        .info-content strong {
            display: block;
            margin-bottom: 4px;
            font-size: 1.1rem;
            color: #222634;
        }

        .info-content span {
            display: block;
            font-size: 1rem;
            color: #2f3140;
        }

        .whatsapp-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 22px;
            min-height: 56px;
            width: 100%;
            border: 0;
            border-radius: 3px;
            background: linear-gradient(180deg, var(--success), var(--success-dark));
            color: #fff;
            font-size: 1.2rem;
            font-weight: 700;
            box-shadow: 0 10px 22px rgba(30, 137, 63, 0.18);
        }

        .whatsapp-link span:first-child {
            font-size: 1.5rem;
            line-height: 1;
        }

        @media (max-width: 760px) {
            .topbar {
                padding: 14px 18px;
                flex-direction: column;
                text-align: center;
            }

            .nav {
                justify-content: center;
                gap: 18px 24px;
            }

            .page {
                width: min(100% - 24px, 980px);
                padding-top: 28px;
            }

            .contact-card {
                padding: 24px 14px 16px;
            }
        }

        @media (max-width: 420px) {
            .contact-line {
                font-size: 0.96rem;
            }

            .nav {
                gap: 12px 18px;
            }

            .nav a {
                font-size: 1rem;
            }

            .page-title {
                margin-bottom: 22px;
                font-size: 2rem;
            }

            .contact-card h2 {
                font-size: 1.85rem;
            }

            .contact-card p {
                font-size: 1rem;
            }

            .info-card {
                gap: 14px;
                padding: 14px 12px;
            }

            .info-content strong {
                font-size: 1rem;
            }

            .whatsapp-link {
                min-height: 52px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <header class="topbar">
        <div class="contact-line">Call Us: +91 7756877762</div>
        <nav class="nav">
            <a href="index.html">Home</a>
            <a href="cars.html">Our Cars</a>
            <a href="booking.html">Booking</a>
            <a class="active" href="contact.html">Contact</a>
        </nav>
    </header>

    <main class="page">
        <h1 class="page-title">Contact Us</h1>

        <section class="contact-card">
            <h2>Get in Touch</h2>
            <p>Have questions or want to book a ride? We are here to help you, please contact us using the information below.</p>

            <div class="info-card">
                <div class="info-icon">&#128222;</div>
                <div class="info-content">
                    <strong>Call Us</strong>
                    <span>+91 7756877762</span>
                </div>
            </div>

            <div class="info-card">
                <div class="info-icon">&#128172;</div>
                <div class="info-content">
                    <strong>WhatsApp</strong>
                    <span>+91 7756877762</span>
                </div>
            </div>

           
        </section>
    </main>
</body>
</html>
